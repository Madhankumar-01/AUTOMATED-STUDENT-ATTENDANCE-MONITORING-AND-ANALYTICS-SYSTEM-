{% extends "base.html" %}
{% block title %}Courses{% endblock %}
{% block content %}
<h2>Courses</h2>

<form method="POST" class="inline-form">
    <input type="text" name="name" placeholder="Course Name" required>
    <button type="submit">Add Course</button>
</form>

<table>
    <tr><th>ID</th><th>Course Name</th></tr>
    {% for c in courses %}
    <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
